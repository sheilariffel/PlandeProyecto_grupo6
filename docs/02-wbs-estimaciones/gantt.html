<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gantt — BioNest</title>
<style>
:root {
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;
  --p1:#388bfd;--p2:#3fb950;--p3:#f78166;--p4:#d2a8ff;
  --risk:#f85149;--hito:#ffa657;--ent:#22d3ee;
  --font-mono:'Courier New',monospace;--font:system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;}

.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 28px;display:flex;align-items:flex-start;gap:32px;flex-wrap:wrap;}
.hdr-title h1{font-size:18px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px;}
.hdr-title p{font-size:12px;color:var(--muted);font-family:var(--font-mono);}
.stats{display:flex;gap:20px;margin-left:auto;flex-wrap:wrap;align-items:center;}
.stat{text-align:center;}
.stat-val{font-size:22px;font-weight:700;font-family:var(--font-mono);}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.divider{width:1px;height:36px;background:var(--border);}

.legend{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 28px;display:flex;gap:18px;flex-wrap:wrap;align-items:center;}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
.leg-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0;}
.leg-diamond{width:9px;height:9px;background:var(--hito);transform:rotate(45deg);border-radius:1px;flex-shrink:0;}
.leg-circle{width:14px;height:14px;border-radius:50%;background:var(--ent);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:#071014;font-family:var(--font-mono);}

.gantt-wrap{display:flex;height:calc(100vh - 115px);min-height:400px;overflow:hidden;}

.labels{width:300px;min-width:300px;border-right:1px solid var(--border);background:var(--bg);display:flex;flex-direction:column;overflow:hidden;}
.labels-hdr{height:48px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;flex-shrink:0;}
.labels-body{overflow-y:auto;flex:1;scrollbar-width:none;}
.labels-body::-webkit-scrollbar{display:none;}

.chart{flex:1;overflow:auto;background:var(--bg);}
.chart-inner{position:relative;min-width:max-content;}

.tl-hdr{height:48px;position:sticky;top:0;z-index:10;background:var(--surface);border-bottom:1px solid var(--border);position:relative;}
.tl-week{position:absolute;bottom:5px;font-size:9px;color:var(--muted);font-family:var(--font-mono);transform:translateX(-50%);user-select:none;}
.tl-month{position:absolute;top:7px;font-size:10px;color:var(--text);font-weight:600;user-select:none;}

.r-phase{height:30px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:7px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.r-group{height:26px;background:rgba(255,255,255,.025);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;}
.r-task{height:34px;border-bottom:1px solid rgba(48,54,61,.5);display:flex;align-items:center;padding:0 14px 0 22px;gap:6px;cursor:default;transition:background .1s;}
.r-task:hover{background:rgba(255,255,255,.03);}
.r-task.has-ent{border-left:2px solid var(--ent);}
.t-id{font-family:var(--font-mono);font-size:9px;color:var(--muted);min-width:36px;flex-shrink:0;}
.t-name{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.t-name.risk{color:var(--risk);}
.badge-r{font-size:9px;flex-shrink:0;color:var(--risk);}
.badge-en{font-size:8px;font-weight:800;font-family:var(--font-mono);color:#071014;background:var(--ent);border-radius:3px;padding:1px 4px;flex-shrink:0;letter-spacing:.2px;}

.cr-phase{height:30px;background:var(--surface);border-bottom:1px solid var(--border);position:relative;}
.cr-group{height:26px;background:rgba(255,255,255,.025);border-bottom:1px solid var(--border);position:relative;}
.cr-task{height:34px;border-bottom:1px solid rgba(48,54,61,.5);position:relative;transition:background .1s;}
.cr-task:hover{background:rgba(255,255,255,.03);}

.grid-line{position:absolute;top:0;bottom:0;width:1px;background:rgba(48,54,61,.3);pointer-events:none;}

.bar{position:absolute;top:7px;height:20px;border-radius:4px;cursor:pointer;display:flex;align-items:center;padding:0 5px;overflow:hidden;transition:filter .15s;z-index:2;}
.bar:hover{filter:brightness(1.25);}
.bar-lbl{font-size:9px;font-weight:700;white-space:nowrap;color:rgba(0,0,0,.75);}
.bar-risk{background-image:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(0,0,0,.2) 4px,rgba(0,0,0,.2) 8px)!important;}

.ms-wrap{position:absolute;top:7px;width:20px;height:20px;transform:translateX(-10px);cursor:pointer;z-index:3;}
.ms-diamond{width:13px;height:13px;background:var(--hito);transform:rotate(45deg);border-radius:2px;position:absolute;top:3.5px;left:3.5px;transition:filter .15s;}
.ms-wrap:hover .ms-diamond{filter:brightness(1.3);}
.ms-wait{position:absolute;top:14px;height:6px;border-radius:3px;background:repeating-linear-gradient(90deg,var(--hito),var(--hito) 3px,transparent 3px,transparent 7px);opacity:.35;pointer-events:none;}

/* Deliverable circle marker */
.ent-wrap{position:absolute;top:6px;z-index:5;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;}
.ent-circle{width:22px;height:22px;border-radius:50%;background:var(--ent);border:2px solid #0d1117;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#071014;font-family:var(--font-mono);transition:filter .15s;box-shadow:0 0 8px rgba(34,211,238,.4);}
.ent-wrap:hover .ent-circle{filter:brightness(1.15);box-shadow:0 0 14px rgba(34,211,238,.7);}

/* Vertical deliverable line through all rows */
.ent-vline{position:absolute;top:0;width:1px;background:rgba(34,211,238,.18);pointer-events:none;z-index:1;}

.tt{position:fixed;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:12px;z-index:9999;max-width:300px;box-shadow:0 8px 28px rgba(0,0,0,.6);pointer-events:none;opacity:0;transition:opacity .12s;}
.tt.on{opacity:1;}
.tt-id{font-family:var(--font-mono);font-size:9px;color:var(--muted);margin-bottom:4px;}
.tt-name{font-weight:700;font-size:13px;margin-bottom:8px;line-height:1.3;}
.tt-grid{display:grid;grid-template-columns:auto auto;gap:2px 14px;font-family:var(--font-mono);font-size:11px;}
.tt-k{color:var(--muted);}
.tt-v{text-align:right;}
.risk-badge{display:inline-block;background:rgba(248,81,73,.15);color:var(--risk);border:1px solid rgba(248,81,73,.3);border-radius:4px;padding:1px 5px;font-size:9px;font-weight:700;margin-top:6px;}
.ent-badge{display:inline-block;background:rgba(34,211,238,.15);color:var(--ent);border:1px solid rgba(34,211,238,.35);border-radius:4px;padding:3px 7px;font-size:11px;font-weight:700;margin-top:8px;font-family:var(--font-mono);}
.ent-date{font-size:11px;color:var(--ent);font-family:var(--font-mono);margin-top:3px;opacity:.8;}

.chart::-webkit-scrollbar{height:5px;width:5px;}
.chart::-webkit-scrollbar-track{background:var(--bg);}
.chart::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>

  <div class="hdr-title">

<script>

// Fecha de inicio del proyecto
const START = new Date(2026, 4, 26); // 26 mayo 2026

function workdayToDate(n) {
  const w = Math.floor((n-1)/5), r = (n-1)%5;
  const d = new Date(START);
  d.setDate(d.getDate() + w*7 + r);
  return d;
}
function fmtDate(d) {
  const M=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${d.getDate()} ${M[d.getMonth()]} ${d.getFullYear()}`;
}

const ENTREGABLE_MAP = {

Object.values(ENTREGABLE_MAP).forEach(e => { e.date = fmtDate(workdayToDate(e.endDay)); });

const dx = d => (d-1)*PPD;

function buildTimeline() {
  const h = document.getElementById('tlHdr');
  h.style.width = CHART_W+'px';
  ['Mes 1','Mes 2','Mes 3','Mes 4','Mes 5','Mes 6','Mes 7','Mes 8'].forEach((m,i)=>{
    const day=i*22+1; if(day>TOTAL) return;
    const el=document.createElement('div'); el.className='tl-month';
    el.style.left=(dx(day)+3)+'px'; el.textContent=m; h.appendChild(el);
  });
  for(let w=1;w*5<=TOTAL+4;w++){
    const day=(w-1)*5+1; if(day>TOTAL) break;
    const el=document.createElement('div'); el.className='tl-week';
    el.style.left=dx(day)+'px'; el.textContent=`S${w}`; h.appendChild(el);
  }
}

const lblBody=document.getElementById('lblBody');
const chartRows=document.getElementById('chartRows');

function addGridLines(c){
  for(let d=1;d<TOTAL;d+=5){
    const l=document.createElement('div'); l.className='grid-line';
    l.style.cssText=`left:${dx(d)}px;position:absolute;top:0;bottom:0;pointer-events:none;`;
    c.appendChild(l);
  }
}

// Count total rows to size vertical lines
let totalRowH = 0;
const rowHeights = []; // will fill during buildRows

function buildRows(){
  chartRows.style.width=CHART_W+'px';
  addGridLines(chartRows);

  ITEMS.forEach(item=>{
    if(item.T==='phase'){
      const ld=document.createElement('div'); ld.className='r-phase';
      ld.style.color=PC[item.ph];
      ld.innerHTML=`<span style="width:3px;height:14px;background:${PC[item.ph]};border-radius:2px;display:inline-block;"></span>${PH_NAMES[item.ph]}`;
      lblBody.appendChild(ld);
      const cd=document.createElement('div'); cd.className='cr-phase';
      cd.style.background=`linear-gradient(to right,${PC[item.ph]}18,transparent 60%)`;
      cd.style.borderBottom=`1px solid ${PC[item.ph]}44`;
      chartRows.appendChild(cd);

    } else if(item.T==='group'){
      const ld=document.createElement('div'); ld.className='r-group';
      ld.textContent=GR_NAMES[item.gr]||''; lblBody.appendChild(ld);
      const cd=document.createElement('div'); cd.className='cr-group';
      chartRows.appendChild(cd);

    } else {
      const entInfo = ENTREGABLE_MAP[item.id];
      const isR=!!item.risk;

      // Label
      const ld=document.createElement('div');
      ld.className='r-task'+(entInfo?' has-ent':'');
      let lh=`<span class="t-id">${item.id}</span>`;
      if(entInfo) lh+=`<span class="badge-en">E${entInfo.num}</span>`;
      lh+=`<span class="t-name${isR?' risk':''}">${item.name}</span>`;
      if(isR) lh+=`<span class="badge-r">⚠</span>`;
      ld.innerHTML=lh; lblBody.appendChild(ld);

      // Chart row
      const cd=document.createElement('div'); cd.className='cr-task';

      if(item.milestone){
        if(item.wait){
          const wb=document.createElement('div'); wb.className='ms-wait';
          wb.style.left=dx(item.wait[0])+'px';
          wb.style.width=((item.wait[1]-item.wait[0]+1)*PPD)+'px';
          cd.appendChild(wb);
        }
        const ms=document.createElement('div'); ms.className='ms-wrap';
        ms.style.left=dx(item.s)+'px';
        ms.innerHTML='<div class="ms-diamond"></div>';
        addTooltip(ms,item); cd.appendChild(ms);
      } else {
        const barW=Math.max((item.e-item.s+1)*PPD,6);
        const bar=document.createElement('div');
        bar.className='bar'+(isR?' bar-risk':'');
        bar.style.cssText=`left:${dx(item.s)}px;width:${barW}px;background:${PC[item.ph]};opacity:${isR?.9:.85};`;
        if(barW>28) bar.innerHTML=`<span class="bar-lbl">${item.te.toFixed(0)}h</span>`;
        addTooltip(bar,item); cd.appendChild(bar);
      }

      // Deliverable circle marker
      if(entInfo){
        const endX = entInfo.endDay * PPD; // pixel at end of trigger day
        const wrap=document.createElement('div'); wrap.className='ent-wrap';
        wrap.style.left=(endX-11)+'px';
        wrap.innerHTML=`<div class="ent-circle">${entInfo.num}</div>`;
        addEntTooltip(wrap, entInfo);
        cd.appendChild(wrap);
      }

      chartRows.appendChild(cd);
    }
  });

  // Draw vertical teal lines for each entregable across all rows
  const totalH = chartRows.scrollHeight || 1400;
  Object.values(ENTREGABLE_MAP).forEach(e=>{
    const x = e.endDay * PPD;
    const vl = document.createElement('div');
    vl.className='ent-vline';
    vl.style.cssText=`left:${x}px;height:${totalH}px;`;
    chartRows.appendChild(vl);
  });
}

const tt=document.getElementById('tt');

function addTooltip(el,item){
  el.addEventListener('mouseenter',e=>{
    let html=`<div class="tt-id">${item.id}</div><div class="tt-name">${item.name}</div>`;
    if(item.milestone){
      html+=`<div style="color:var(--hito);font-size:11px;margin-top:2px">⬧ HITO — trámite administrativo</div>`;
      html+=`<div style="color:var(--muted);font-size:11px;margin-top:4px">Espera estimada: ~30–45 días calendario</div>`;
    } else {
      const dur=item.e-item.s+1;
      html+=`<div class="tt-grid">
        <span class="tt-k">TE (tiempo esperado)</span><span class="tt-v">${item.te.toFixed(1)} hs/p</span>
        <span class="tt-k">σ (desvío estándar)</span><span class="tt-v">± ${item.σ.toFixed(2)} hs</span>
        <span class="tt-k">Duración</span><span class="tt-v">${dur} días hábiles</span>
        <span class="tt-k">Ventana</span><span class="tt-v">D${item.s} → D${item.e}</span>
        <span class="tt-k">Inicio est.</span><span class="tt-v">${fmtDate(workdayToDate(item.s))}</span>
        <span class="tt-k">Fin est.</span><span class="tt-v">${fmtDate(workdayToDate(item.e))}</span>
      </div>`;
      if(item.risk) html+=`<div class="risk-badge">⚠ ALTO RIESGO TÉCNICO</div>`;
    }
    tt.innerHTML=html; tt.classList.add('on'); moveTooltip(e);
  });
  el.addEventListener('mousemove',moveTooltip);
  el.addEventListener('mouseleave',()=>tt.classList.remove('on'));
}

function addEntTooltip(el,info){
  el.addEventListener('mouseenter',e=>{
    const html=`
      <div class="tt-id">ENTREGABLE ${info.num}</div>
      <div class="tt-name">${info.name}</div>
      <div class="tt-grid">
        <span class="tt-k">Día hábil</span><span class="tt-v">D${info.endDay}</span>
      </div>
      <div class="ent-badge">📅 ${info.date}</div>`;
    tt.innerHTML=html; tt.classList.add('on'); moveTooltip(e);
  });
  el.addEventListener('mousemove',moveTooltip);
  el.addEventListener('mouseleave',()=>tt.classList.remove('on'));
}

function moveTooltip(e){
  const m=12,tw=295,th=160;
  let x=e.clientX+m, y=e.clientY+m;
  if(x+tw>window.innerWidth-m) x=e.clientX-tw-m;
  if(y+th>window.innerHeight-m) y=e.clientY-th-m;
  tt.style.left=x+'px'; tt.style.top=y+'px';
}

document.getElementById('chart').addEventListener('scroll',e=>{lblBody.scrollTop=e.target.scrollTop;});
document.getElementById('weeksVal').textContent=Math.ceil(164/5);

buildTimeline();
buildRows();
</script>
